<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#111827"/>

  <!-- Barbell shaft -->
  <rect x="96" y="240" width="320" height="32" rx="16" fill="#E5E7EB"/>

  <!-- Left outer plate -->
  <rect x="80" y="192" width="36" height="128" rx="10" fill="#9CA3AF"/>
  <!-- Left inner plate -->
  <rect x="124" y="208" width="24" height="96" rx="7" fill="#D1D5DB"/>

  <!-- Right inner plate -->
  <rect x="364" y="208" width="24" height="96" rx="7" fill="#D1D5DB"/>
  <!-- Right outer plate -->
  <rect x="396" y="192" width="36" height="128" rx="10" fill="#9CA3AF"/>

  <!-- Reticle: outer circle -->
  <circle cx="256" cy="256" r="108" stroke="#3B82F6" stroke-width="10" stroke-dasharray="20 12"/>

  <!-- Reticle: inner circle -->
  <circle cx="256" cy="256" r="60" stroke="#3B82F6" stroke-width="6"/>

  <!-- Reticle: center dot -->
  <circle cx="256" cy="256" r="10" fill="#3B82F6"/>

  <!-- Reticle: crosshair lines (top) -->
  <line x1="256" y1="148" x2="256" y2="188" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
  <!-- Reticle: crosshair lines (bottom) -->
  <line x1="256" y1="324" x2="256" y2="364" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
  <!-- Reticle: crosshair lines (left) -->
  <line x1="148" y1="256" x2="188" y2="256" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
  <!-- Reticle: crosshair lines (right) -->
  <line x1="324" y1="256" x2="364" y2="256" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
</svg>
